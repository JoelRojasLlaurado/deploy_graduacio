services:
  backend:
    image: joelrojasllauradoupc/backend-graduacio:1.8.0
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      MONGO_URI: mongodb://mongo:27017/graduacio
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - default
      - mongo_net

  backoffice:
    image: joelrojasllauradoupc/backoffice-graduacio:1.2.0
    restart: unless-stopped
    ports:
      - "4200:4200"
    depends_on:
      backend:
        condition: service_started

  webapp:
    image: joelrojasllauradoupc/webapp-graduacio:1.0.2
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backoffice:
        condition: service_started

  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo_net

networks:
  mongo_net:
    internal: true

volumes:
  mongo_data:
